apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-blue-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
      slot: blue
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: blue
    spec:
      containers:
        - name: sentiment-api
          image: catmommy/sentiment-api:unstable
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: sentiment-logs
              mountPath: /app/logs
      volumes:
        - name: sentiment-logs
          persistentVolumeClaim:
            claimName: sentiment-logs-pvc
